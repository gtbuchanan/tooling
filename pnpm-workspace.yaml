allowBuilds:
  esbuild: true
  unrs-resolver: false

catalog:
  '@changesets/cli': ^2.29.4
  '@eslint-community/eslint-plugin-eslint-comments': 4.7.2
  '@eslint/json': 2.0.0
  '@eslint/markdown': 8.0.2
  '@faker-js/faker': ^10.4.0
  '@pnpm/lockfile.types': ^1100.0.5
  '@prettier/plugin-xml': ^3.4.2
  '@stylistic/eslint-plugin': 5.10.0
  '@tsconfig/strictest': ^2.0.8
  '@types/cross-spawn': ^6.0.6
  '@types/hosted-git-info': ^3.0.5
  '@types/mdast': ^4.0.4
  '@types/node': ^25.5.0
  '@vitest/coverage-v8': ^4.1.2
  '@vitest/eslint-plugin': 1.6.20
  ajv: ^8.20.0
  citty: ^0.2.2
  console-fail-test: 0.6.1
  cross-spawn: ^7.0.6
  eslint: ^10.0.0
  eslint-plugin-format: 2.0.1
  eslint-plugin-import-x: 4.17.1
  eslint-plugin-jsdoc: 63.0.10
  eslint-plugin-n: 18.2.1
  eslint-plugin-only-warn: 1.2.1
  eslint-plugin-pnpm: 1.6.1
  eslint-plugin-promise: ^7.2.1
  eslint-plugin-regexp: 3.1.1
  eslint-plugin-toml: 1.4.0
  eslint-plugin-unicorn: ^70.0.0
  eslint-plugin-yml: 3.5.0
  find-up-simple: ^1.0.1
  hosted-git-info: ^10.1.1
  jiti: ^2.6.1
  markdownlint: ^0.41.0
  prettier: ^3.8.3
  prettier-plugin-css-order: 2.2.0
  prettier-plugin-multiline-arrays: 4.1.9
  prettier-plugin-packagejson: 3.0.2
  prettier-plugin-sort-json: 4.2.0
  prettier-plugin-toml: 2.0.6
  skills: 1.5.14
  skills-npm: 1.2.0
  smol-toml: 1.7.0
  turbo: ^2.5.4
  typescript: ^6.0.0
  typescript-eslint: 8.62.1
  valibot: 1.4.2
  vitest: ^4.1.2
  yaml: ^2.8.3

engineStrict: true

hoist: false

lockfileIncludeTarballUrl: false

# 4320 minutes = 3 days, matching the shared Renovate preset's quarantine.
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@gtbuchanan/*'

packages:
  - 'packages/*'

peerDependencyRules:
  allowedVersions:
    # https://github.com/eslint-community/eslint-plugin-promise/issues/616
    eslint-plugin-promise>eslint: '>=10'

strictPeerDependencies: true
