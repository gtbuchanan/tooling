---
exclude: '[-.]lock\.'
repos:
  - hooks:
      - id: check-added-large-files
        name: '[*] No Large Files'
      - id: check-illegal-windows-names
        name: '[*] No Illegal Windows Names'
      - id: end-of-file-fixer
        name: '[*] EOF New Line'
      - id: fix-byte-order-marker
        name: '[*] No BOM'
      - id: forbid-submodules
        name: '[Git] No Submodules'
      - id: no-commit-to-branch
        name: '[Git] No Commit to Branch'
      - id: trailing-whitespace
        name: '[*] No Trailing Whitespace'
    repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
  - hooks:
      - args: [--strict]
        files: ^default\.json$
        id: renovate-config-validator
        name: '[Renovate] Lint Preset'
      - args: [--strict]
        id: renovate-config-validator
        name: '[Renovate] Lint'
    repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.207.3
  # language: system because the config packages aren't published yet.
  # Consumers should use language: node with additional_dependencies.
  - hooks:
      # ESLint handles linting, formatting (via eslint-plugin-format),
      # and markdown structural checks (via eslint-plugin-markdownlint).
      - entry: pnpm exec eslint --fix --max-warnings=0 --no-warn-ignored
        id: eslint
        language: system
        name: eslint
    repo: local
