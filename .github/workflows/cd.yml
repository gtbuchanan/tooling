---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Requires npm trusted publishing (OIDC) configured for each package.
  publish:
    environment: release
    if: needs.version.outputs.hasChangesets == 'false'
    name: Publish
    needs: version
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: gtbuchanan/tooling/.github/actions/mise-setup@main

      - uses: gtbuchanan/tooling/.github/actions/turbo-run@main
        with:
          task: pack

      - env:
          NPM_CONFIG_PROVENANCE: 'true'
        name: Publish packages
        run: pnpm dlx @changesets/cli@${{ needs.version.outputs.changesets-version }} publish

  version:
    name: Version
    outputs:
      changesets-version: ${{ steps.changesets.outputs.version }}
      hasChangesets: ${{ steps.changesets-action.outputs.hasChangesets }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: gtbuchanan/tooling/.github/actions/mise-setup@main

      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: changesets
        uses: gtbuchanan/tooling/.github/actions/pnpm-resolve-pinned@main
        with:
          package: '@changesets/cli'

      - env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        id: changesets-action
        uses: changesets/action@v1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          version: pnpm dlx @changesets/cli@${{ steps.changesets.outputs.version }} version

name: CD

# Reusable: changesets version + npm publish (OIDC) — the deploy phase.
# Run by the Release pipeline (release.yml) as its `CD` job after CI
# passes. The publish job's `release` environment and OIDC token resolve
# in the caller's repo, so the caller must grant `contents: write` +
# `id-token: write` and define a `release` environment.
on:
  workflow_call:
    secrets:
      APP_PRIVATE_KEY:
        description: >-
          GitHub App private key for opening the changesets
          release PR (paired with the APP_ID repository
          variable).
        required: false

permissions:
  contents: read
