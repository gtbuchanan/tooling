env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    if: github.head_ref != 'changeset-release/main'
    name: Changeset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json

      - id: changesets
        uses: ./.github/actions/pnpm-resolve-pinned
        with:
          package: '@changesets/cli'

      - name: Verify changeset exists
        run: pnpm dlx @changesets/cli@${{ steps.changesets.outputs.version }} status --since=origin/main

  # Provides the required "Changeset" status check when the real check is skipped
  check-release:
    if: github.head_ref == 'changeset-release/main'
    name: Changeset
    runs-on: ubuntu-latest
    steps:
      - run: echo 'Release PR consumes changesets — skipping'

name: Changeset

on:
  pull_request:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read
