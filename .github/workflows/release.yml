---
jobs:
  cd:
    name: CD
    needs: ci
    permissions:
      contents: write
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/cd.yml
    with:
      # tooling vendors @gtbuchanan/cli as a workspace package, so CD runs gtb
      # from source (`pnpm run gtb`) rather than an installed bin.
      gtb-from-source: true

  ci:
    name: CI
    secrets: inherit
    uses: ./.github/workflows/ci.yml

  # Seed the cross-PR lint baseline cache from this commit's own lint
  # output. `needs: ci` lets the seed's lint hit the remote cache that
  # CI just warmed instead of re-linting.
  lint-baseline:
    name: Lint
    needs: ci
    uses: ./.github/workflows/lint-regression.yml
    with:
      gtb-from-source: true
      seed: true

name: Release

# The main-branch pipeline: re-run CI as a gate, then CD (version +
# publish via cd.yml). CI and CD are peer jobs. The CD job grants the
# superset its publish step needs — a called workflow can only narrow
# the caller's token, never elevate it.
on:
  push:
    branches: [main]

permissions:
  contents: read
