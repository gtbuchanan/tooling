---
jobs:
  cd:
    name: CD
    needs: ci
    permissions:
      contents: write
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/cd.yml

  ci:
    name: CI
    secrets: inherit
    uses: ./.github/workflows/ci.yml

name: Release

# The main-branch pipeline: re-run CI as a gate, then CD (version +
# publish via cd.yml). CI and CD are peer jobs. The CD job grants the
# superset its publish step needs — a called workflow can only narrow
# the caller's token, never elevate it.
on:
  push:
    branches: [main]

permissions:
  contents: read
