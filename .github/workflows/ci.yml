env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/turbo-run
        with:
          task: build:ci

      - uses: actions/upload-artifact@v5
        with:
          name: packages
          path: packages/*/dist/packages/npm/*.tgz

      # When slow tests are enabled, merged coverage comes from the coverage job.
      # Otherwise, fast-only coverage is the final artifact.
      - if: inputs.run-slow-tests != true
        uses: actions/upload-artifact@v5
        with:
          if-no-files-found: error
          name: coverage
          path: packages/*/dist/coverage/vitest/fast/

  codecov:
    if: >-
      !cancelled()
      && needs.build.result == 'success'
      && (needs.coverage.result == 'success'
      || needs.coverage.result == 'skipped')
    name: Codecov
    needs: [build, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: coverage
          path: packages

      # Codecov distributes the CLI as a binary at cli.codecov.io with
      # only a "latest" URL — no versioned downloads. SHA256 validates
      # integrity per release; pin to a version if they add support.
      - name: Install Codecov CLI
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          curl -Os https://cli.codecov.io/latest/linux/codecov.SHA256SUM
          sha256sum -c codecov.SHA256SUM
          chmod +x codecov
          sudo mv codecov /usr/local/bin/
        shell: bash

      - uses: ./.github/actions/pnpm-tasks

      - continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        name: Upload coverage
        run: pnpm turbo run coverage:codecov:upload
        shell: bash

  config-check:
    name: Config Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/pnpm-tasks

      - name: Check config drift
        run: pnpm turbo:check

  coverage:
    if: inputs.run-slow-tests == true
    name: Coverage
    needs: [build, slow-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/turbo-run
        with:
          task: coverage:merge

      - uses: actions/upload-artifact@v5
        with:
          if-no-files-found: error
          name: coverage
          path: packages/*/dist/coverage/vitest/merged/

  e2e:
    if: inputs.run-e2e == '' || inputs.run-e2e == true
    name: E2E Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/turbo-run
        with:
          task: test:e2e

  slow-tests:
    if: inputs.run-slow-tests == true
    name: Slow Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/turbo-run
        with:
          task: test:slow

      - uses: actions/upload-artifact@v5
        with:
          if-no-files-found: error
          name: test-results-slow
          path: packages/*/dist/test-results/

name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      run-e2e:
        default: true
        description: Run e2e tests (artifact tier)
        type: boolean
      run-slow-tests:
        default: false
        description: Run slow source tests
        type: boolean
    secrets:
      CODECOV_TOKEN:
        description: >-
          Codecov upload token (required for private repos,
          optional for public)
        required: false

permissions:
  contents: read
