env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/pnpm-tasks

      - name: Build
        run: pnpm build:ci

      # Two artifacts from the same build output:
      # - source: prepared publishConfig.directory contents for changeset publish
      # - packages: packed .tgz files for e2e tests
      # A single artifact can't serve both — tarballs would need to be
      # unpacked back into per-package dist/source/ dirs for publish.
      - uses: actions/upload-artifact@v5
        with:
          name: source
          path: packages/*/dist/source/

      - uses: actions/upload-artifact@v5
        with:
          name: packages
          path: packages/*/dist/packages/npm/*.tgz

      # When slow tests are enabled, upload blob for merging.
      # Otherwise, upload coverage directly as the final artifact.
      - if: inputs.run-slow-tests == true
        uses: actions/upload-artifact@v5
        with:
          if-no-files-found: error
          name: test-results-fast
          path: packages/*/dist/test-results/

      - if: inputs.run-slow-tests != true
        uses: actions/upload-artifact@v5
        with:
          if-no-files-found: error
          name: coverage
          path: packages/*/dist/coverage/

  coverage:
    if: inputs.run-slow-tests == true
    name: Coverage
    needs: [build, slow-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/pnpm-tasks

      - uses: actions/download-artifact@v5
        with:
          path: dist/test-results-parts
          pattern: test-results-*

      - name: Merge Coverage
        run: |
          mkdir -p dist/test-results/vitest
          for f in dist/test-results-parts/*/vitest/blob.json; do
            part="$(basename "$(dirname "$(dirname "$f")")")"
            cp "$f" "dist/test-results/vitest/${part}.json"
          done
          pnpm exec vitest --merge-reports dist/test-results/vitest --reporter=default

      - uses: actions/upload-artifact@v5
        with:
          if-no-files-found: error
          name: coverage
          path: dist/coverage/

  e2e:
    if: inputs.run-e2e == '' || inputs.run-e2e == true
    name: E2E Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/pnpm-tasks

      - uses: actions/download-artifact@v5
        with:
          name: packages

      - name: E2E Test
        run: pnpm test:e2e

  slow-tests:
    if: inputs.run-slow-tests == true
    name: Slow Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/pnpm-tasks

      - name: Slow Tests
        run: pnpm test:slow

      - uses: actions/upload-artifact@v5
        with:
          if-no-files-found: error
          name: test-results-slow
          path: packages/*/dist/test-results/

name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      run-e2e:
        default: true
        description: Run e2e tests (artifact tier)
        type: boolean
      run-slow-tests:
        default: false
        description: Run slow source tests
        type: boolean

permissions:
  contents: read
