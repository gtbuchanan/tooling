env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/turbo-run
        with:
          task: build:ci

      - uses: actions/upload-artifact@v5
        with:
          name: packages
          path: packages/*/dist/packages/npm/*.tgz

      # When slow tests are enabled, merged coverage comes from the coverage job.
      # Otherwise, fast-only coverage is the final artifact.
      - if: inputs.run-slow-tests != true
        uses: actions/upload-artifact@v5
        with:
          if-no-files-found: error
          name: coverage
          path: packages/*/dist/coverage/vitest/fast/

  config-check:
    name: Config Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/pnpm-tasks

      - name: Check config drift
        run: pnpm turbo:check

  coverage:
    if: inputs.run-slow-tests == true
    name: Coverage
    needs: [build, slow-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/turbo-run
        with:
          task: coverage:merge

      - uses: actions/upload-artifact@v5
        with:
          if-no-files-found: error
          name: coverage
          path: packages/*/dist/coverage/vitest/merged/

  e2e:
    if: inputs.run-e2e == '' || inputs.run-e2e == true
    name: E2E Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/turbo-run
        with:
          task: test:e2e

  slow-tests:
    if: inputs.run-slow-tests == true
    name: Slow Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/turbo-run
        with:
          task: test:slow

      - uses: actions/upload-artifact@v5
        with:
          if-no-files-found: error
          name: test-results-slow
          path: packages/*/dist/test-results/

name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      run-e2e:
        default: true
        description: Run e2e tests (artifact tier)
        type: boolean
      run-slow-tests:
        default: false
        description: Run slow source tests
        type: boolean

permissions:
  contents: read
